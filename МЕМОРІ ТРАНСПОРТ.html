<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меморі: Техніка</title>
    <style>
        /* Скидання стилів та базові налаштування */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { 
            overflow: hidden; 
            font-family: 'Arial', sans-serif; 
            background-color: #2b2b36; 
            color: #333;
        }

        /* Головний контейнер гри */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* SVG Фон заводу/будівництва */
        #bg-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Анімації фону (шестерні, конвеєр) */
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        @keyframes spin-reverse {
            100% { transform: rotate(-360deg); }
        }
        .gear { transform-origin: center; }
        .gear-cw { animation: spin 20s linear infinite; }
        .gear-ccw { animation: spin-reverse 15s linear infinite; }
        
        @keyframes steamRise {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-300px) scale(3); opacity: 0; }
        }
        .steam { animation: steamRise 8s infinite ease-out; transform-origin: center; }
        .steam:nth-child(2) { animation-delay: 2.5s; }
        .steam:nth-child(3) { animation-delay: 5s; }

        /* Кнопки навігації (розташовані зверху) */
        .nav-controls {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
            pointer-events: auto;
        }

        .nav-btn {
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            border: 3px solid #7ea8f8;
            color: #fff;
            padding: 12px 25px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.2);
            text-shadow: 1px 1px 2px #000;
        }
        .nav-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), inset 0 0 15px rgba(255,255,255,0.4);
            border-color: #a3c2ff;
        }
        .nav-btn:active {
            transform: scale(0.95);
        }

        /* Ігрове поле (сітка карток) */
        #board-layer {
            position: absolute;
            top: 100px; /* Зсув вниз, щоб звільнити місце для кнопок */
            left: 0;
            width: 100%;
            height: calc(100% - 120px);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        #memory-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            padding: 20px;
            background: rgba(30, 40, 50, 0.85);
            border: 8px solid #556b82;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.5);
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        /* Картка та 3D перевороти */
        .card {
            width: 140px;
            height: 140px;
            perspective: 1000px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.05); }
        .card:active { transform: scale(0.95); }
        
        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        
        .card.flipped .card-inner { transform: rotateY(180deg); }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%; height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #3a4a5a;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }

        /* Лицьова сторона (рубашка) - Металеві смуги */
        .card-front {
            background: repeating-linear-gradient(
                45deg,
                #f1c40f,
                #f1c40f 20px,
                #2c3e50 20px,
                #2c3e50 40px
            );
            border: 4px solid #7f8c8d;
        }
        /* Внутрішній шевроний декор на рубашці */
        .card-front::after {
            content: '';
            position: absolute;
            width: 70%; height: 70%;
            background: radial-gradient(circle, #34495e, #2c3e50);
            border-radius: 50%;
            border: 4px dashed #95a5a6;
            box-shadow: inset 0 0 10px #000;
        }

        /* Задня сторона (де техніка) */
        .card-back {
            background: radial-gradient(circle, #e0eaf5 0%, #8ca1b5 100%);
            transform: rotateY(180deg);
            border-color: #bdc3c7;
        }

        /* Стан "Знайдено пару" */
        .card.matched .card-back {
            background: radial-gradient(circle, #e0f5e0 0%, #68b568 100%);
            border-color: #2ecc71;
            box-shadow: 0 0 20px #2ecc71, inset 0 0 15px #27ae60;
            animation: pulseMatch 1.5s infinite alternate;
        }
        @keyframes pulseMatch {
            0% { box-shadow: 0 0 15px #2ecc71; }
            100% { box-shadow: 0 0 35px #2ecc71, inset 0 0 20px #2ecc71; }
        }

        /* Стан "Зникла" (після повторного кліку) */
        .card.cleared {
            visibility: hidden;
            opacity: 0;
            transition: all 0.5s ease-out;
            transform: scale(0) rotate(180deg);
            pointer-events: none;
        }

        /* Частинки та іскри */
        .spark {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 200;
            animation: explode 0.8s forwards cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        @keyframes explode {
            0% { transform: scale(1) translate(0, 0); opacity: 1; }
            100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; }
        }

        /* Анімації персонажа (Єнот-інженер) */
        #raccoon-arm { transform-origin: 140px 140px; transition: transform 0.3s; }
        #raccoon-head { transform-origin: 100px 80px; transition: transform 0.3s; }
        .raccoon-eye { transform-origin: center; animation: blink 4s infinite; }
        @keyframes blink { 0%, 96%, 100% { transform: scaleY(1); } 98% { transform: scaleY(0.1); } }
    </style>
</head>
<body>

<div id="game-container">
    <svg id="bg-svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
        <defs>
            <pattern id="factory-wall" width="60" height="30" patternUnits="userSpaceOnUse">
                <rect width="60" height="30" fill="#30303d"/>
                <rect x="1" y="1" width="58" height="13" fill="#3a3a48"/>
                <rect x="-29" y="16" width="58" height="13" fill="#3a3a48"/>
                <rect x="31" y="16" width="58" height="13" fill="#3a3a48"/>
            </pattern>
            <g id="gear-shape">
                <circle cx="0" cy="0" r="40" fill="#7f8c8d" stroke="#2c3e50" stroke-width="4"/>
                <circle cx="0" cy="0" r="15" fill="#2c3e50"/>
                <path d="M -10 -45 L 10 -45 L 15 -35 L -15 -35 Z" fill="#7f8c8d"/>
                <path d="M -10 45 L 10 45 L 15 35 L -15 35 Z" fill="#7f8c8d"/>
                <path d="M -45 -10 L -45 10 L -35 15 L -35 -15 Z" fill="#7f8c8d"/>
                <path d="M 45 -10 L 45 10 L 35 15 L 35 -15 Z" fill="#7f8c8d"/>
                <path d="M -30 -30 L -20 -40 L -15 -30 L -25 -20 Z" fill="#7f8c8d"/>
                <path d="M 30 30 L 20 40 L 15 30 L 25 20 Z" fill="#7f8c8d"/>
                <path d="M -30 30 L -20 40 L -15 30 L -25 20 Z" fill="#7f8c8d"/>
                <path d="M 30 -30 L 20 -40 L 15 -30 L 25 -20 Z" fill="#7f8c8d"/>
            </g>
        </defs>

        <rect width="100%" height="100%" fill="url(#factory-wall)"/>

        <rect x="0" y="50" width="1920" height="40" fill="#e67e22" stroke="#d35400" stroke-width="5"/>
        <rect x="0" y="900" width="1920" height="60" fill="#e67e22" stroke="#d35400" stroke-width="5"/>
        <line x1="300" y1="50" x2="300" y2="1080" stroke="#d35400" stroke-width="30"/>
        <line x1="1600" y1="50" x2="1600" y2="1080" stroke="#d35400" stroke-width="30"/>

        <g transform="translate(150, 200) scale(1.5)" class="gear gear-cw"><use href="#gear-shape"/></g>
        <g transform="translate(260, 260) scale(1)" class="gear gear-ccw"><use href="#gear-shape"/></g>
        <g transform="translate(1750, 750) scale(2)" class="gear gear-cw"><use href="#gear-shape"/></g>
        <g transform="translate(1600, 850) scale(1.2)" class="gear gear-ccw"><use href="#gear-shape"/></g>

        <g fill="#ecf0f1">
            <circle cx="150" cy="800" r="40" class="steam"/>
            <circle cx="180" cy="820" r="50" class="steam"/>
            <circle cx="120" cy="830" r="45" class="steam"/>
        </g>

        <g id="raccoon-character" transform="translate(1600, 650)">
            <ellipse cx="100" cy="180" rx="50" ry="70" fill="#7f8c8d"/>
            <ellipse cx="100" cy="190" rx="35" ry="50" fill="#bdc3c7"/>
            <path d="M 50 180 Q 100 230 150 180 L 140 250 Q 100 260 60 250 Z" fill="#2980b9"/>
            <rect x="65" y="160" width="15" height="30" fill="#f39c12"/>
            <rect x="120" y="160" width="15" height="30" fill="#f39c12"/>
            <rect x="70" y="240" width="20" height="40" fill="#7f8c8d" rx="10"/>
            <rect x="110" y="240" width="20" height="40" fill="#7f8c8d" rx="10"/>
            <ellipse cx="80" cy="280" rx="20" ry="10" fill="#34495e"/>
            <ellipse cx="120" cy="280" rx="20" ry="10" fill="#34495e"/>
            <g id="raccoon-arm">
                <rect x="130" y="140" width="60" height="20" fill="#7f8c8d" rx="10" transform="rotate(-30 130 140)"/>
                <g transform="translate(180, 100) rotate(45)">
                    <rect x="0" y="-5" width="60" height="10" fill="#bdc3c7"/>
                    <circle cx="60" cy="0" r="12" fill="#bdc3c7"/>
                    <circle cx="60" cy="0" r="6" fill="#2b2b36"/>
                    <path d="M -10 -15 L 10 -15 L 5 0 L 10 15 L -10 15 Z" fill="#bdc3c7"/>
                </g>
            </g>
            <rect x="30" y="150" width="20" height="60" fill="#7f8c8d" rx="10" transform="rotate(20 30 150)"/>
            <g id="raccoon-head">
                <ellipse cx="100" cy="100" rx="60" ry="45" fill="#7f8c8d"/>
                <polygon points="50,70 30,30 70,50" fill="#34495e"/>
                <polygon points="150,70 170,30 130,50" fill="#34495e"/>
                <path d="M 45 95 Q 70 80 100 100 Q 130 80 155 95 Q 160 115 130 120 Q 100 110 70 120 Q 40 115 45 95 Z" fill="#2c3e50"/>
                <circle cx="75" cy="100" r="12" fill="#fff" class="raccoon-eye"/>
                <circle cx="125" cy="100" r="12" fill="#fff" class="raccoon-eye"/>
                <circle cx="75" cy="100" r="5" fill="#000"/>
                <circle cx="125" cy="100" r="5" fill="#000"/>
                <circle cx="100" cy="125" r="8" fill="#000"/>
                <path d="M 40 70 Q 100 10 160 70 Z" fill="#f1c40f"/>
                <rect x="35" y="65" width="130" height="10" fill="#f39c12" rx="5"/>
            </g>
        </g>
    </svg>

    <div class="nav-controls">
        <button class="nav-btn" onclick="resetGame()">&#9664; Назад</button>
        <button class="nav-btn" onclick="resetGame()">Далі &#9654;</button>
    </div>

    <div id="board-layer">
        <div id="memory-grid">
            </div>
    </div>
</div>

<script>
    // --- АУДІО СИСТЕМА (Синтез звуків техніки) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const actx = new AudioContext();

    function playSound(type) {
        if(actx.state === 'suspended') actx.resume();
        const osc = actx.createOscillator();
        const gain = actx.createGain();
        osc.connect(gain);
        gain.connect(actx.destination);

        const now = actx.currentTime;

        if (type === 'flip') {
            // Металевий клік
            osc.type = 'square';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'match') {
            // Успішний механічний дзвінок
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.setValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        } else if (type === 'mismatch') {
            // Глухий гудок (помилка)
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(150, now + 0.3);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'clear') {
            // Звук випаровування/пневматики
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(1000, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        }
    }

    // --- ВІЗУАЛЬНІ ЕФЕКТИ ТА ПЕРСОНАЖ ---
    const raccoonArm = document.getElementById('raccoon-arm');
    const raccoonHead = document.getElementById('raccoon-head');

    function animHappy() {
        raccoonArm.style.transform = 'rotate(-60deg)';
        raccoonHead.style.transform = 'translateY(-10px)';
        setTimeout(() => {
            raccoonArm.style.transform = 'rotate(-30deg)';
            raccoonHead.style.transform = 'translateY(0)';
        }, 1000);
    }

    function animSad() {
        raccoonHead.style.transform = 'rotate(15deg) translateY(10px)';
        setTimeout(() => {
            raccoonHead.style.transform = 'rotate(0) translateY(0)';
        }, 1000);
    }

    function createSparks(x, y, count=20) {
        const colors = ['#f1c40f', '#e67e22', '#e74c3c', '#ecf0f1'];
        for(let i=0; i<count; i++) {
            const spark = document.createElement('div');
            spark.className = 'spark';
            spark.style.left = x + 'px';
            spark.style.top = y + 'px';
            spark.style.width = Math.random() * 8 + 4 + 'px';
            spark.style.height = spark.style.width;
            spark.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 100 + 50;
            spark.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            spark.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
            
            document.body.appendChild(spark);
            setTimeout(() => spark.remove(), 800);
        }
    }

    // --- ДАНІ КАРТОК (10 деталізованих SVG іконок техніки) ---
    const vehicleSVGs = [
        // 1. Трактор
        `<svg viewBox="0 0 100 100" width="100" height="100">
            <rect x="20" y="40" width="50" height="30" fill="#27ae60"/>
            <rect x="50" y="20" width="30" height="30" fill="#f1c40f"/>
            <rect x="55" y="25" width="20" height="15" fill="#34495e"/>
            <circle cx="30" cy="70" r="15" fill="#2c3e50" stroke="#7f8c8d" stroke-width="4"/>
            <circle cx="70" cy="70" r="20" fill="#2c3e50" stroke="#7f8c8d" stroke-width="4"/>
            <path d="M 20 40 L 10 50 L 10 70 L 20 70 Z" fill="#2ecc71"/>
        </svg>`,
        // 2. Екскаватор
        `<svg viewBox="0 0 100 100" width="100" height="100">
            <rect x="40" y="40" width="40" height="30" fill="#f39c12"/>
            <polygon points="40,40 60,20 80,40" fill="#f1c40f"/>
            <rect x="30" y="70" width="60" height="15" fill="#34495e" rx="5"/>
            <circle cx="40" cy="77.5" r="5" fill="#7f8c8d"/>
            <circle cx="60" cy="77.5" r="5" fill="#7f8c8d"/>
            <circle cx="80" cy="77.5" r="5" fill="#7f8c8d"/>
            <path d="M 45 50 L 20 30 L 10 50 L 20 60" fill="none" stroke="#2c3e50" stroke-width="6" stroke-linejoin="round"/>
            <path d="M 5 45 C 10 40 20 45 15 55 Z" fill="#7f8c8d"/>
        </svg>`,
        // 3. Вантажівка (Самоскид)
        `<svg viewBox="0 0 100 100" width="100" height="100">
            <path d="M 10 30 L 55 30 L 50 60 L 10 60 Z" fill="#e74c3c"/>
            <rect x="60" y="40" width="30" height="30" fill="#2980b9" rx="3"/>
            <rect x="65" y="45" width="15" height="10" fill="#ecf0f1"/>
            <circle cx="30" cy="75" r="12" fill="#2c3e50" stroke="#95a5a6" stroke-width="3"/>
            <circle cx="75" cy="75" r="12" fill="#2c3e50" stroke="#95a5a6" stroke-width="3"/>
            <line x1="50" y1="65" x2="60" y2="65" stroke="#34495e" stroke-width="6"/>
        </svg>`,
        // 4. Підйомний кран
        `<svg viewBox="0 0 100 100" width="100" height="100">
            <rect x="30" y="80" width="40" height="10" fill="#c0392b"/>
            <polygon points="45,80 55,80 50,20" fill="#f1c40f"/>
            <line x1="20" y1="30" x2="80" y2="20" stroke="#f39c12" stroke-width="6"/>
            <line x1="25" y1="30" x2="25" y2="60" stroke="#7f8c8d" stroke-width="2"/>
            <path d="M 20 60 Q 25 70 30 60" fill="none" stroke="#34495e" stroke-width="4"/>
            <circle cx="35" cy="85" r="6" fill="#2c3e50"/>
            <circle cx="65" cy="85" r="6" fill="#2c3e50"/>
        </svg>`,
        // 5. Бетономішалка
        `<svg viewBox="0 0 100 100" width="100" height="100">
            <rect x="60" y="40" width="30" height="30" fill="#e74c3c" rx="5"/>
            <rect x="65" y="45" width="15" height="15" fill="#ecf0f1"/>
            <ellipse cx="35" cy="45" rx="25" ry="20" fill="#ecf0f1" transform="rotate(-15 35 45)"/>
            <path d="M 15 35 Q 35 25 50 45" fill="none" stroke="#bdc3c7" stroke-width="4"/>
            <rect x="20" y="65" width="70" height="10" fill="#34495e"/>
            <circle cx="30" cy="75" r="12" fill="#2c3e50" stroke="#95a5a6" stroke-width="3"/>
            <circle cx="50" cy="75" r="12" fill="#2c3e50" stroke="#95a5a6" stroke-width="3"/>
            <circle cx="75" cy="75" r="12" fill="#2c3e50" stroke="#95a5a6" stroke-width="3"/>
        </svg>`,
        // 6. Потяг (Локомотив)
        `<svg viewBox="0 0 100 100" width="100" height="100">
            <rect x="15" y="50" width="40" height="20" fill="#2c3e50"/>
            <rect x="55" y="30" width="30" height="40" fill="#c0392b"/>
            <rect x="60" y="35" width="15" height="15" fill="#f1c40f"/>
            <rect x="25" y="30" width="10" height="20" fill="#7f8c8d"/>
            <circle cx="25" cy="15" r="5" fill="#bdc3c7"/>
            <circle cx="35" cy="10" r="7" fill="#bdc3c7"/>
            <circle cx="25" cy="75" r="10" fill="#e74c3c" stroke="#34495e" stroke-width="3"/>
            <circle cx="45" cy="75" r="10" fill="#e74c3c" stroke="#34495e" stroke-width="3"/>
            <circle cx="70" cy="75" r="14" fill="#e74c3c" stroke="#34495e" stroke-width="3"/>
            <line x1="25" y1="75" x2="70" y2="75" stroke="#bdc3c7" stroke-width="4"/>
        </svg>`,
        // 7. Корабель
        `<svg viewBox="0 0 100 100" width="100" height="100">
            <path d="M 10 60 L 90 60 L 80 80 L 20 80 Z" fill="#2980b9"/>
            <rect x="30" y="40" width="40" height="20" fill="#ecf0f1"/>
            <rect x="40" y="20" width="10" height="20" fill="#e74c3c"/>
            <circle cx="40" cy="50" r="4" fill="#34495e"/>
            <circle cx="50" cy="50" r="4" fill="#34495e"/>
            <circle cx="60" cy="50" r="4" fill="#34495e"/>
            <path d="M 0 80 Q 25 70 50 80 T 100 80" fill="none" stroke="#3498db" stroke-width="5"/>
        </svg>`,
        // 8. Літак
        `<svg viewBox="0 0 100 100" width="100" height="100">
            <ellipse cx="50" cy="50" rx="40" ry="12" fill="#ecf0f1"/>
            <path d="M 30 50 L 50 15 L 60 15 L 50 50 Z" fill="#3498db"/>
            <path d="M 30 50 L 50 85 L 60 85 L 50 50 Z" fill="#2980b9"/>
            <path d="M 80 50 L 95 35 L 95 50 Z" fill="#e74c3c"/>
            <circle cx="20" cy="48" r="4" fill="#34495e"/>
            <circle cx="30" cy="48" r="3" fill="#34495e"/>
            <circle cx="40" cy="48" r="3" fill="#34495e"/>
        </svg>`,
        // 9. Гелікоптер
        `<svg viewBox="0 0 100 100" width="100" height="100">
            <ellipse cx="40" cy="50" rx="25" ry="15" fill="#e74c3c"/>
            <path d="M 60 50 L 90 45 L 90 55 Z" fill="#c0392b"/>
            <rect x="35" y="25" width="4" height="10" fill="#7f8c8d"/>
            <line x1="10" y1="25" x2="70" y2="25" stroke="#34495e" stroke-width="4"/>
            <line x1="85" y1="35" x2="85" y2="65" stroke="#34495e" stroke-width="3"/>
            <path d="M 30 65 L 20 75 L 60 75 L 50 65" fill="none" stroke="#7f8c8d" stroke-width="4"/>
            <ellipse cx="30" cy="45" rx="8" ry="5" fill="#ecf0f1"/>
        </svg>`,
        // 10. Підводний човен
        `<svg viewBox="0 0 100 100" width="100" height="100">
            <ellipse cx="50" cy="60" rx="35" ry="15" fill="#f1c40f"/>
            <rect x="40" y="35" width="20" height="15" fill="#f39c12"/>
            <path d="M 50 35 L 50 20 L 60 20" fill="none" stroke="#7f8c8d" stroke-width="4"/>
            <circle cx="35" cy="60" r="5" fill="#3498db"/>
            <circle cx="50" cy="60" r="5" fill="#3498db"/>
            <circle cx="65" cy="60" r="5" fill="#3498db"/>
            <path d="M 85 60 L 95 50 L 95 70 Z" fill="#e67e22"/>
            <path d="M 10 75 Q 30 65 50 75 T 90 75" fill="none" stroke="#2980b9" stroke-width="3"/>
        </svg>`
    ];

    // --- ЛОГІКА ГРИ МЕМОРІ ---
    let cardsArray = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let matchedPairsCount = 0;
    const totalPairs = 10;

    function initGame() {
        const grid = document.getElementById('memory-grid');
        grid.innerHTML = '';
        cardsArray = [];
        matchedPairsCount = 0;
        firstCard = null;
        secondCard = null;
        lockBoard = false;

        // Дублюємо іконки для створення пар
        let deck = [];
        vehicleSVGs.forEach((svg, index) => {
            deck.push({ id: index, svg: svg });
            deck.push({ id: index, svg: svg });
        });

        // Перемішування Фішера-Йейтса
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }

        // Рендер карток
        deck.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.id = item.id;

            const inner = document.createElement('div');
            inner.className = 'card-inner';

            const front = document.createElement('div');
            front.className = 'card-front';

            const back = document.createElement('div');
            back.className = 'card-back';
            back.innerHTML = item.svg;

            inner.appendChild(front);
            inner.appendChild(back);
            card.appendChild(inner);

            card.addEventListener('click', (e) => handleCardClick(card, e));
            grid.appendChild(card);
            cardsArray.push(card);
        });
    }

    function handleCardClick(card, event) {
        if (lockBoard) return;
        if (card.classList.contains('cleared')) return;

        // СПЕЦІАЛЬНА МЕХАНІКА: Якщо клікнули на ВЖЕ знайдену пару
        if (card.classList.contains('matched')) {
            clearMatchedPair(card.dataset.id, event.clientX, event.clientY);
            return;
        }

        // Захист від подвійного кліку по тій самій картці
        if (card === firstCard) return;

        // Переворот
        card.classList.add('flipped');
        playSound('flip');

        if (!firstCard) {
            firstCard = card;
            return;
        }

        secondCard = card;
        checkForMatch();
    }

    function checkForMatch() {
        let isMatch = firstCard.dataset.id === secondCard.dataset.id;
        if (isMatch) {
            disableCards();
        } else {
            unflipCards();
        }
    }

    function disableCards() {
        playSound('match');
        animHappy();
        firstCard.classList.add('matched');
        secondCard.classList.add('matched');
        
        resetBoard();
    }

    function unflipCards() {
        lockBoard = true;
        playSound('mismatch');
        animSad();

        setTimeout(() => {
            firstCard.classList.remove('flipped');
            secondCard.classList.remove('flipped');
            playSound('flip');
            resetBoard();
        }, 1200);
    }

    function resetBoard() {
        [firstCard, secondCard, lockBoard] = [null, null, false];
    }

    function clearMatchedPair(id, x, y) {
        playSound('clear');
        createSparks(x, y, 30);
        
        // Знаходимо обидві картки цієї пари та робимо їх невидимими
        cardsArray.forEach(c => {
            if (c.dataset.id === id && c.classList.contains('matched')) {
                c.classList.add('cleared');
                // Додаємо ефект іскор і на другу картку
                const rect = c.getBoundingClientRect();
                createSparks(rect.left + rect.width/2, rect.top + rect.height/2, 15);
            }
        });

        matchedPairsCount++;
        
        // Якщо всі пари видалені - кінець гри (перезапуск для безперервності)
        if (matchedPairsCount === totalPairs) {
            setTimeout(() => {
                animHappy();
                playSound('match');
                initGame();
            }, 1500);
        }
    }

    function resetGame() {
        initGame();
    }

    // Запуск при завантаженні
    window.onload = initGame;

</script>
</body>
</html>
